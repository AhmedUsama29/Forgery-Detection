<div class="container mt-5">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">🎓 Issue Secure Certificate</h4>
    </div>
    <div class="card-body p-4">
      <form (ngSubmit)="issueDocument()" #certForm="ngForm">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Student Name</label>
          <input type="text" class="form-control" [(ngModel)]="student().student_name" name="student_name" required placeholder="e.g. Ahmed Osama">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Faculty</label>
          <input type="text" class="form-control" [(ngModel)]="student().faculty" name="faculty" required>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Grade</label>
            <select class="form-select" [(ngModel)]="student().grade" name="grade">
              <option value="Excellent">Excellent</option>
              <option value="Very Good">Very Good</option>
              <option value="Good">Good</option>
              <option value="Pass">Pass</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Graduation Year</label>
            <input type="number" class="form-control" [(ngModel)]="student().graduation_year" name="graduation_year" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="!certForm.form.valid || isLoading()">
          <span *ngIf="isLoading()" class="spinner-border spinner-border-sm me-2"></span>
          {{ isLoading() ? 'Generating & Signing...' : 'Issue Certificate' }}
        </button>

      </form>

      <div *ngIf="successMessage()" class="alert alert-success mt-3">
        {{ successMessage() }}
      </div>
    </div>
  </div>
</div>
